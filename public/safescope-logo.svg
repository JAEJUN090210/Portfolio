<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">SafeScope logo</title>
  <desc id="desc">Blue security scope and magnifier mark with the SafeScope wordmark.</desc>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a3ee"/>
      <stop offset="1" stop-color="#1557ef"/>
    </linearGradient>
    <linearGradient id="wordBlue" x1=".1" y1="0" x2=".9" y2="1">
      <stop offset="0" stop-color="#276cf4"/>
      <stop offset="1" stop-color="#0d54ee"/>
    </linearGradient>
  </defs>

  <!-- Scope / shield mark -->
  <g fill="none" stroke="url(#blue)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M757 406c-5-64-63-116-135-116-83 0-141 58-141 111 0 35 29 60 65 60h137c47 0 67 38 67 62 0 58-55 126-129 181-79-60-128-128-135-191" stroke-width="38"/>
    <path d="M735 590l82 91" stroke-width="38"/>
  </g>

  <!-- Four-pane center detail -->
  <g fill="#57afe7">
    <rect x="590" y="525" width="24" height="26" rx="2"/>
    <rect x="626" y="525" width="24" height="26" rx="2"/>
    <rect x="590" y="562" width="24" height="25" rx="2"/>
    <rect x="626" y="562" width="24" height="25" rx="2"/>
  </g>

  <!-- Wordmark. Convert text to outlines in a design app if a font-independent file is needed. -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="146" font-weight="700" letter-spacing="-9">
    <text x="253" y="888" fill="#0d1d3d">Safe</text>
    <text x="594" y="888" fill="url(#wordBlue)">Scope</text>
  </g>
</svg>
