<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">SafeScope horizontal logo</title>
  <desc id="desc">Blue security scope and magnifier mark beside the SafeScope wordmark.</desc>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a3ee"/>
      <stop offset="1" stop-color="#1557ef"/>
    </linearGradient>
    <linearGradient id="wordBlue" x1=".1" y1="0" x2=".9" y2="1">
      <stop offset="0" stop-color="#276cf4"/>
      <stop offset="1" stop-color="#0d54ee"/>
    </linearGradient>
  </defs>

  <!-- Scope / shield mark -->
  <g fill="none" stroke="url(#blue)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M383 426c-4-54-53-98-113-98-70 0-119 49-119 94 0 30 25 51 55 51h115c40 0 59 32 59 53 0 49-46 106-108 152-66-50-108-107-114-160" stroke-width="32"/>
    <path d="M368 588l62 68" stroke-width="32"/>
  </g>
  <g fill="#57afe7">
    <rect x="248" y="523" width="20" height="21" rx="2"/>
    <rect x="278" y="523" width="20" height="21" rx="2"/>
    <rect x="248" y="553" width="20" height="21" rx="2"/>
    <rect x="278" y="553" width="20" height="21" rx="2"/>
  </g>

  <!-- Transparent background; wordmark stays editable as vector text. -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="182" font-weight="700" letter-spacing="-12">
    <text x="472" y="595" fill="#0d1d3d">Safe</text>
    <text x="896" y="595" fill="url(#wordBlue)">Scope</text>
  </g>
</svg>
